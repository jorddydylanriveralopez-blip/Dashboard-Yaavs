<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#001a3d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#00b4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00b4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#0055ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00b4ff" stroke-width="0.6" opacity="0.12"/>
    </pattern>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#38bdf8" opacity="0.25"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <g transform="skewY(-8) translate(0 120)" opacity="0.5">
    <rect x="-100" y="200" width="2200" height="900" fill="url(#grid)"/>
  </g>
  <g stroke="#00b4ff" stroke-width="1.2" fill="none" opacity="0.35" filter="url(#blur)">
    <path d="M120 540 Q480 320 840 520 T1560 400"/>
    <path d="M0 720 Q360 580 720 760 T1920 620"/>
    <path d="M200 900 Q560 700 920 880 T1700 740"/>
  </g>
  <g stroke="#0055ff" stroke-width="0.8" fill="none" opacity="0.25">
    <path d="M80 400 L320 400 L420 280 L680 280"/>
    <path d="M1240 200 L1480 200 L1580 320 L1840 320"/>
