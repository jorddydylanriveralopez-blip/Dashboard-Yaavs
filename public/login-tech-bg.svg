    <circle cx="1480" cy="200" r="4"/><circle cx="1580" cy="320" r="3"/><circle cx="840" cy="520" r="6"/>
    <circle cx="1560" cy="400" r="4"/><circle cx="720" cy="760" r="5"/><circle cx="920" cy="880" r="4"/>
  </g>
  <g opacity="0.15" stroke="#38bdf8" stroke-width="1" fill="none">
    <polygon points="1600,120 1680,160 1680,240 1600,280 1520,240 1520,160"/>
    <polygon points="200,180 260,210 260,270 200,300 140,270 140,210"/>
    <polygon points="1100,780 1160,810 1160,870 1100,900 1040,870 1040,810"/>
